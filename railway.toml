# Railway: create a service with Root Directory = bekrin-back/
# Variables (dashboard): DJANGO_SETTINGS_MODULE=config.settings.prod, DATABASE_URL, DJANGO_SECRET_KEY,
# ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS, REDIS_URL (web + worker), etc.

[build]
# Railway Railpack (successor to Nixpacks) — no Dockerfile required
builder = "RAILPACK"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --threads 3 --timeout 120"
releaseCommand = "sh -c 'export DJANGO_SETTINGS_MODULE=\"${DJANGO_SETTINGS_MODULE:-config.settings.prod}\" && python manage.py migrate --noinput && python manage.py collectstatic --noinput'"
restartPolicyType = "ON_FAILURE"
# HTTP health check: set only on the *web* service in Railway (Settings → Deploy → Healthcheck Path) to /api/health/
# Do not enable HTTP healthchecks on the Celery worker (no HTTP server).
